# Don't print a new line at the start of the prompt
add_newline = false

# Main prompt format
format = """
${custom.repo_name}\
$directory  $git_branch $git_status $git_state $git_commit\
$line_break\
$character\
"""

# Prompt symbols
[character]
success_symbol = "[Ņ®▒ ’üŗ](bold fg:#8839EF)"
error_symbol   = "[’ĆŹ ’üŗ](bold fg:#D20F39)"    # red

# Disable the package module
[package]
disabled = true

[custom.repo_name]
command = '''
# 1. Get the remote name and URL
remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null | cut -d/ -f1)
remote=${remote:-origin}
url=$(git remote get-url "$remote" 2>/dev/null)

# 2. Determine the icon based on the host
if [[ "$url" =~ "github" ]]; then
  icon="¾░Ŗż" 
elif [[ "$url" =~ "gitlab" ]]; then
  icon="’Ŗ¢" 
elif [[ "$url" =~ "gitea" || "$url" =~ "forgejo" ]]; then
  icon="¾░¤Ą" 
elif [[ "$url" =~ "bitbucket" ]]; then
  icon="¾░ŖŁ" 
else
  icon="¾░ś¼" 
fi

# 3. Extract owner/repo and output with icon
if [ -n "$url" ]; then
  repo=$(echo "$url" | sed -E 's/\.git$//; s/.*[:\/]([^/]+\/[^/]+)$/\1/')
  echo "$icon $repo"
else
  echo "¾░ēŗ $(basename "$PWD")"
fi
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[ŅéČ](fg:#1E66F5)[$output](bg:#1E66F5 fg:#EFF1F5)[Ņé┤](fg:#1E66F5) "

[git_branch]
style = "bg:#8839EF fg:#EFF1F5"
symbol = "¾░ś¼"
format = "[ŅéČ](bold fg:#8839EF)[$symbol $branch(:$remote_branch)](fg:#EFF1F5 bg:#8839EF)[Ņé┤ ](bold fg:#8839EF)"

[git_status]
conflicted = '( $count’ü”)(#FF5555)'
ahead      = '( $count’ÉŖ)(#55FF55)'
behind     = '( $count’Éē)(#FFFF55)'
diverged   = '( $count’ä”)(#FF55FF)'
untracked  = '( $count’ü¦)(#55FFFF)'
stashed    = '( $count’Ć¬)(#8839EF)'
modified   = '( $count’æł)(#DF8E1D)'
staged     = '[ ++($count)](#40A02B)'
renamed    = '( $count’æÜ)(#55AAFF)'
deleted    = '( $count’ģå)(#FF5555)'

[directory]
home_symbol = " ’æŁ "
read_only = " ’æ¢ "
style = "bg:#EA76CB fg:#EFF1F5"
truncation_length = 0
truncate_to_repo = true
format = '[ŅéČ](bold fg:#EA76CB)[¾░ēŗ $path]($style)[Ņé┤](bold fg:#EA76CB)'

[line_break]
disabled = false

