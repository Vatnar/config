# Don't print a new line at the start of the prompt
add_newline = false

# Main prompt format
format = """
${custom.repo_name}\
$directory  $git_branch $git_status $git_state $git_commit\
$line_break\
$character\
"""

# Prompt symbols
[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#CBA6F7)"
error_symbol   = "[пҖҚ пҒӢ](bold fg:#F38BA8)"    # red

# Disable the package module
[package]
disabled = true

[custom.repo_name]
command = '''
# 1. Get the remote name and URL
remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null | cut -d/ -f1)
remote=${remote:-origin}
url=$(git remote get-url "$remote" 2>/dev/null)

# 2. Determine the icon based on the host
if [[ "$url" =~ "github" ]]; then
  icon="у°ҠӨ" 
elif [[ "$url" =~ "gitlab" ]]; then
  icon="пҠ–" 
elif [[ "$url" =~ "gitea" || "$url" =~ "forgejo" ]]; then
  icon="у°ҹө" 
elif [[ "$url" =~ "bitbucket" ]]; then
  icon="у°Ҡӯ" 
else
  icon="у°ҳ¬" 
fi

# 3. Extract owner/repo and output with icon
if [ -n "$url" ]; then
  repo=$(echo "$url" | sed -E 's/\.git$//; s/.*[:\/]([^/]+\/[^/]+)$/\1/')
  echo "$icon $repo"
else
  echo "у°үӢ $(basename "$PWD")"
fi
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[оӮ¶](fg:#89B4FA)[$output](bg:#89B4FA fg:#1E1E2E)[оӮҙ](fg:#89B4FA) "

[git_branch]
style = "bg:#CBA6F7 fg:#1E1E2E"
symbol = "у°ҳ¬"
format = "[оӮ¶](bold fg:#CBA6F7)[$symbol $branch(:$remote_branch)](fg:#1E1E2E bg:#CBA6F7)[оӮҙ ](bold fg:#CBA6F7)"

[git_status]
conflicted = '( $countвҡ”пёҸ)(#FF5555)'
ahead      = '( $countрҹҸҺрҹ’Ё)(#55FF55)'
behind     = '( $countрҹҗў)(#FFFF55)'
diverged   = '( $countрҹ”Җ)(#FF55FF)'
untracked  = '( $countрҹҶ•)(#55FFFF)'
stashed    = '( $countрҹ“Ұ)(#AAAAFF)'
modified   = '( $countвңҸпёҸ)(#FFA500)'
staged     = '[ ++($count)](#ABE9B3)'
renamed    = '( $countвңҚпёҸ)(#55AAFF)'
deleted    = '( $countрҹ—‘)(#FF5555)'

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:#F5C2E7 fg:#1E1E2E"
truncation_length = 0
truncate_to_repo = true
format = '[оӮ¶](bold fg:#F5C2E7)[у°үӢ $path]($style)[оӮҙ](bold fg:#F5C2E7)'

[line_break]
disabled = false

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "
