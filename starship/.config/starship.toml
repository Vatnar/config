# Don't print a new line at the start of the prompt
add_newline = false

# Main prompt format
format = """
${custom.repo_name}\
$directory  $git_branch $git_status $git_state $git_commit\
$line_break\
$character\
"""

# Prompt symbols
[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#8839EF)"
error_symbol   = "[пҖҚ пҒӢ](bold fg:#D20F39)"    # red

# Disable the package module
[package]
disabled = true

[custom.repo_name]
command = '''
# 1. Get the remote name and URL
remote=$(git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null | cut -d/ -f1)
remote=${remote:-origin}
url=$(git remote get-url "$remote" 2>/dev/null)

# 2. Determine the icon based on the host
if [[ "$url" =~ "github" ]]; then
  icon="у°ҠӨ" 
elif [[ "$url" =~ "gitlab" ]]; then
  icon="пҠ–" 
elif [[ "$url" =~ "gitea" || "$url" =~ "forgejo" ]]; then
  icon="у°ҹө" 
elif [[ "$url" =~ "bitbucket" ]]; then
  icon="у°Ҡӯ" 
else
  icon="у°ҳ¬" 
fi

# 3. Extract owner/repo and output with icon
if [ -n "$url" ]; then
  repo=$(echo "$url" | sed -E 's/\.git$//; s/.*[:\/]([^/]+\/[^/]+)$/\1/')
  echo "$icon $repo"
else
  echo "у°үӢ $(basename "$PWD")"
fi
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[оӮ¶](fg:#1E66F5)[$output](bg:#1E66F5 fg:#EFF1F5)[оӮҙ](fg:#1E66F5) "

[git_branch]
style = "bg:#8839EF fg:#EFF1F5"
symbol = "у°ҳ¬"
format = "[оӮ¶](bold fg:#8839EF)[$symbol $branch(:$remote_branch)](fg:#EFF1F5 bg:#8839EF)[оӮҙ ](bold fg:#8839EF)"

[git_status]
conflicted = '( $countвҡ”пёҸ)(#FF5555)'
ahead      = '( $countрҹҸҺрҹ’Ё)(#55FF55)'
behind     = '( $countрҹҗў)(#FFFF55)'
diverged   = '( $countрҹ”Җ)(#FF55FF)'
untracked  = '( $countрҹҶ•)(#55FFFF)'
stashed    = '( $countрҹ“Ұ)(#8839EF)'
modified   = '( $countвңҸпёҸ)(#DF8E1D)'
staged     = '[ ++($count)](#40A02B)'
renamed    = '( $countвңҚпёҸ)(#55AAFF)'
deleted    = '( $countрҹ—‘)(#FF5555)'

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:#EA76CB fg:#EFF1F5"
truncation_length = 0
truncate_to_repo = true
format = '[оӮ¶](bold fg:#EA76CB)[у°үӢ $path]($style)[оӮҙ](bold fg:#EA76CB)'

[line_break]
disabled = false

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "
