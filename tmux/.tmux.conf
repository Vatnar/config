set -g default-shell /usr/bin/zsh

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
bind r source-file ~/.tmux.conf


bind -n M-i select-pane -U
bind -n M-j select-pane -L
bind -n M-k select-pane -D
bind -n M-l select-pane -R

bind Tab last-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

set-option -g allow-rename off
set -g renumber-windows on

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour '#89b4fa'

# copy mode
setw -g mode-style 'fg=#1e1e2e bg=#89b4fa'

# panes
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#cdd6f4 bg=#1e1e2e'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=#a6e3a1 bg=#1e1e2e'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=#1e1e2e bg=#89b4fa'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#cdd6f4 bg=#45475a'
setw -g window-status-format ' #I #[fg=#cdd6f4]#W #[fg=#6c7086]#F '

setw -g window-status-bell-style 'fg=#1e1e2e bg=#f38ba8 bold'

# messages
set -g message-style 'fg=#1e1e2e bg=#89b4fa'

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect save/restore keybinds
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
